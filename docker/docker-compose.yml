version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../db.sqlite3:/app/db.sqlite3
      - static_files:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=netadmin.settings
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_files:
