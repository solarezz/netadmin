server {
    listen 80;
    server_name localhost;

    location /static/ {
        alias /app/staticfiles/;
    }

    # Обратный прокси для WebFig MikroTik
    # URL: /webfig/<ip-адрес>/<путь>
    # Пример: /webfig/10.1.1.11/ → http://10.1.1.11/
    location ~ ^/webfig/(?<mikrotik_host>[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)(?<mikrotik_path>/.*)?$ {
        resolver 127.0.0.11 valid=10s;
        set $mikrotik_target http://$mikrotik_host;
        set $path_part $mikrotik_path;
        if ($path_part = "") {
            set $path_part /;
        }
        proxy_pass $mikrotik_target$path_part$is_args$args;
        proxy_set_header Host $mikrotik_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # Перехватываем редиректы MikroTik и переписываем их через прокси
        proxy_redirect http://$mikrotik_host/ /webfig/$mikrotik_host/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
